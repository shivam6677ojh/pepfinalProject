apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: zoneuser/frontend:latest
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_URL
              value: http://backend-service:5000/api
