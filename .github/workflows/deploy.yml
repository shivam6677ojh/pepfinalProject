name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: docker build -t zoneuser/backend:latest ./team-project-management/backend

      - name: Push Backend
        run: docker push zoneuser/backend:latest

      - name: Build Frontend
        run: docker build -t zoneuser/frontend:latest ./team-project-management/frontend

      - name: Push Frontend
        run: docker push zoneuser/frontend:latest

